# Optional Alertmanager receiver template for email and Slack notifications.
route:
  receiver: email-and-slack
  group_by:
    - alertname
    - severity
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: email-and-slack
    email_configs:
      - to: ops@example.com
        from: infrawatch@example.com
        smarthost: smtp.example.com:587
        auth_username: replace-with-smtp-user
        auth_password: replace-with-smtp-password
        require_tls: true
        send_resolved: true
    slack_configs:
      - api_url: https://hooks.slack.com/services/replace/me
        channel: "#infra-alerts"
        send_resolved: true

# Prometheus alert rules for InfraWatch services and Kubernetes workloads.
groups:
  - name: infrawatch.rules
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: Service is down
          description: "Prometheus has been unable to scrape {{ $labels.job }} for more than 1 minute."

      - alert: HighCpuUsage
        expr: sum(rate(container_cpu_usage_seconds_total[5m])) by (pod) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Pod CPU usage above 80 percent
          description: "{{ $labels.pod }} is consuming high CPU for at least 5 minutes."

      - alert: PodCrashLooping
        expr: max_over_time(kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"}[5m]) >= 1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Pod is crash looping
          description: "{{ $labels.pod }} has been in CrashLoopBackOff."

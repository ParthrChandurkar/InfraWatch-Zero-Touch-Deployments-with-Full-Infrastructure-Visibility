# Example secret manifest; replace values before applying and never commit real secrets.
apiVersion: v1
kind: Secret
metadata:
  name: infrawatch-secrets
  namespace: infrawatch
type: Opaque
stringData:
  POSTGRES_PASSWORD: replace-with-a-strong-password
  DATABASE_URL: postgresql://infrawatch:replace-with-a-strong-password@infrawatch-postgres:5432/infrawatch
  ALERT_EMAIL_TO: ops@example.com
  ALERT_EMAIL_FROM: infrawatch@example.com
  ALERT_SMARTHOST: smtp.example.com:587
  ALERT_SMTP_USERNAME: replace-with-smtp-user
  ALERT_SMTP_PASSWORD: replace-with-smtp-password
  ALERT_SLACK_WEBHOOK_URL: https://hooks.slack.com/services/replace/me

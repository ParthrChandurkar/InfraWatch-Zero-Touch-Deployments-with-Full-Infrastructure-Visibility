# FastAPI backend deployment with health probes and resource controls.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infrawatch-backend
  namespace: infrawatch
  labels:
    app.kubernetes.io/name: infrawatch-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: infrawatch-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infrawatch-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /internal/metrics
        prometheus.io/port: "8000"
    spec:
      serviceAccountName: infrawatch-backend
      containers:
        - name: backend
          image: docker.io/parthrchandurkar/infrawatch-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: infrawatch-backend-config
            - secretRef:
                name: infrawatch-secrets
                optional: true
          volumeMounts:
            - name: backend-state
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 150m
              memory: 192Mi
            limits:
              cpu: 750m
              memory: 768Mi
      volumes:
        - name: backend-state
          emptyDir: {}
---
# ServiceAccount for future scoped Kubernetes API permissions.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: infrawatch-backend
  namespace: infrawatch
---
# Minimal role allowing InfraWatch to manage namespace-local workloads.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: infrawatch-deployer
  namespace: infrawatch
rules:
  - apiGroups: [""]
    resources: ["services", "pods"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
# Role binding for the backend deployment service account.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: infrawatch-deployer
  namespace: infrawatch
subjects:
  - kind: ServiceAccount
    name: infrawatch-backend
    namespace: infrawatch
roleRef:
  kind: Role
  name: infrawatch-deployer
  apiGroup: rbac.authorization.k8s.io

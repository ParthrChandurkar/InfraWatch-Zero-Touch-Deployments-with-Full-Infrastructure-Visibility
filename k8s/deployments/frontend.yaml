# React frontend deployment served by Nginx.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infrawatch-frontend
  namespace: infrawatch
  labels:
    app.kubernetes.io/name: infrawatch-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: infrawatch-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infrawatch-frontend
    spec:
      containers:
        - name: frontend
          image: docker.io/parthrchandurkar/infrawatch-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
